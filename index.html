<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Personal Finance Dashboard</p>
          <h1>入力した収入・支出・Uber収入を自動保存</h1>
          <p class="hero-copy">LocalStorageに保存し、入力した取引から資産推移を自動計算する個人向け財務管理Webアプリです。</p>
        </div>
        <button class="primary-action" type="button" id="reset-data">サンプルに戻す</button>
      </section>

      <section class="stats-grid" id="stats" aria-label="主要指標"></section>

      <section class="form-grid" aria-label="データ入力フォーム">
        <section class="panel form-panel">
          <div class="panel-heading"><div class="panel-icon">↗</div><h2>収入追加</h2></div>
          <form id="income-form" class="entry-form">
            <label>日付<input type="date" name="date" required /></label>
            <label>内容<input type="text" name="source" placeholder="給与・副業など" required /></label>
            <label>カテゴリ<input type="text" name="category" placeholder="本業" required /></label>
            <label>金額<input type="number" name="amount" min="1" step="1" placeholder="300000" required /></label>
            <button type="submit">収入を保存</button>
          </form>
        </section>

        <section class="panel form-panel">
          <div class="panel-heading"><div class="panel-icon">↘</div><h2>支出追加</h2></div>
          <form id="expense-form" class="entry-form">
            <label>日付<input type="date" name="date" required /></label>
            <label>内容<input type="text" name="name" placeholder="家賃・食費など" required /></label>
            <label>カテゴリ<input type="text" name="category" placeholder="生活費" required /></label>
            <label>金額<input type="number" name="amount" min="1" step="1" placeholder="5000" required /></label>
            <label class="checkbox-label"><input type="checkbox" name="deductible" /> 確定申告の経費に含める</label>
            <button type="submit">支出を保存</button>
          </form>
        </section>

        <section class="panel form-panel">
          <div class="panel-heading"><div class="panel-icon">🚲</div><h2>Uber収入追加</h2></div>
          <form id="uber-form" class="entry-form">
            <label>日付<input type="date" name="date" required /></label>
            <label>週・期間<input type="text" name="week" placeholder="6/17週" required /></label>
            <label>配達件数<input type="number" name="deliveries" min="1" step="1" required /></label>
            <label>売上<input type="number" name="gross" min="0" step="1" required /></label>
            <label>チップ<input type="number" name="tips" min="0" step="1" value="0" required /></label>
            <label>手数料・経費<input type="number" name="fees" min="0" step="1" value="0" required /></label>
            <button type="submit">Uber収入を保存</button>
          </form>
        </section>
      </section>

      <section class="dashboard-grid">
        <section class="panel wide">
          <div class="panel-heading"><div class="panel-icon">💼</div><h2>資産推移グラフ</h2></div>
          <p class="section-copy">初期資産に毎月の収入、Uber純収入、支出を反映して自動計算します。</p>
          <div id="asset-chart" class="chart"></div>
        </section>

        <section class="panel">
          <div class="panel-heading"><div class="panel-icon">🚲</div><h2>Uber収入管理</h2></div>
          <div id="uber-chart" class="chart small"></div>
          <div class="uber-summary"><span>平均配達単価</span><strong id="average-delivery"></strong></div>
          <div id="uber-table" class="table-wrap compact-wrap"></div>
        </section>

        <section class="panel">
          <div class="panel-heading"><div class="panel-icon">↗</div><h2>収入管理</h2></div>
          <div id="income-table" class="table-wrap"></div>
        </section>

        <section class="panel">
          <div class="panel-heading"><div class="panel-icon">↘</div><h2>支出管理</h2></div>
          <div id="expense-table" class="table-wrap"></div>
        </section>

        <section class="panel wide">
          <div class="panel-heading"><div class="panel-icon">🧾</div><h2>確定申告用経費管理</h2></div>
          <div class="tax-layout">
            <div>
              <p class="section-copy">経費対象の支出を自動集計し、カテゴリ別に確認できます。</p>
              <div id="tax-table" class="table-wrap"></div>
            </div>
            <div class="tax-card"><span>今年の経費見込み</span><strong id="annual-deduction"></strong><p>現在の月次経費をもとにした年間換算です。</p></div>
          </div>
        </section>
      </section>
    </main>
    <script src="/src/app.js"></script>
  </body>
</html>
